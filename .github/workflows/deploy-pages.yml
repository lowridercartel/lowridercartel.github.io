name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:    # ✅ Fixed: added missing colon

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  NODE_OPTIONS: "--no-deprecation"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # ✅ Forces Node 24 now

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6   # ✅ Updated: Node 24 compatible

      # --- Uncomment if you build your site ---
      # - name: Setup Node.js
      #   uses: actions/setup-node@v6   # ✅ Updated
      #   with:
      #     node-version: 22
      # - name: Install & Build
      #   run: npm ci && npm run build
      # --- End build section ---

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6   # ✅ Updated

      - name: Upload site files
        uses: actions/upload-pages-artifact@v5   # ✅ Updated
        with:
          path: '.'   # change to './dist' or './build' for Vite/React/Vue

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5   # ✅ Latest stable
